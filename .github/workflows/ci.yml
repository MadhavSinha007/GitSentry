name: GitSentry CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make curl

      - name: Download nlohmann/json
        run: |
          mkdir -p third_party
          curl -sSL \
            https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp \
            -o third_party/json.hpp

      - name: Build
        run: make

      - name: Verify binary
        run: ./GitSentry --version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: GitSentry-binary
          path: GitSentry

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ make curl

      - name: Download nlohmann/json
        run: |
          mkdir -p third_party
          curl -sSL \
            https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp \
            -o third_party/json.hpp

      - name: Compile tests
        run: |
          g++ -std=c++17 -Ithird_party \
              tests/test_scanner.cpp \
              src/core/entropy.cpp \
              src/utils.cpp \
              -o test_runner

      - name: Run tests
        run: ./test_runner

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: GitSentry-binary

      - name: Make binary executable
        run: chmod +x GitSentry

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la config

      - name: Scan repo for secrets
        env:
          GITSENTRY_CONFIG: config/patterns.json
        run: ./GitSentry scan --full